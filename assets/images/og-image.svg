<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Fond gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0b0f"/>
      <stop offset="100%" stop-color="#13131a"/>
    </linearGradient>

    <!-- Gradient accent pour titre -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <!-- Gradient logo mark -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Glow radial -->
    <radialGradient id="glow1" cx="15%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="90%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>

    <!-- Pattern grille -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a3d" stroke-width="1"/>
    </pattern>

    <!-- Masque radial pour la grille (atténue les bords) -->
    <radialGradient id="gridMask" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <mask id="fadeGrid">
      <rect width="1200" height="630" fill="url(#gridMask)"/>
    </mask>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grille estompée -->
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#fadeGrid)"/>

  <!-- Glows -->
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo mark en haut -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="72" height="72" rx="16" fill="url(#logoGrad)"/>
    <text x="36" y="52" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="40" font-weight="800" fill="white">A</text>
  </g>

  <!-- "Ayoub.dev" -->
  <text x="180" y="132" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#f5f5fa" letter-spacing="-1">
    Ayoub<tspan fill="#a1a1b5">.dev</tspan>
  </text>

  <!-- Eyebrow badge -->
  <g transform="translate(80, 220)">
    <rect x="0" y="0" width="320" height="40" rx="20" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="22" cy="20" r="4" fill="#818cf8"/>
    <text x="38" y="26" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8" letter-spacing="1.5">DÉVELOPPEUR WEB FREELANCE</text>
  </g>

  <!-- Titre principal -->
  <text x="80" y="360" font-family="Inter, -apple-system, sans-serif" font-size="84" font-weight="800" fill="#f5f5fa" letter-spacing="-3">
    Votre site pro,
  </text>
  <text x="80" y="460" font-family="Inter, -apple-system, sans-serif" font-size="84" font-weight="800" fill="url(#accent)" letter-spacing="-3">
    livré en 7 jours.
  </text>

  <!-- Tagline -->
  <text x="80" y="530" font-family="Inter, sans-serif" font-size="26" font-weight="400" fill="#a1a1b5">
    Code artisanal · SEO optimisé · 100% sur-mesure
  </text>

  <!-- Footer URL -->
  <text x="80" y="580" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="600" fill="#71717f">
    ayoub-seterrahmane.fr
  </text>

  <!-- Ornement : cercles décoratifs en bas à droite -->
  <g transform="translate(1000, 450)" opacity="0.9">
    <circle cx="80" cy="80" r="70" fill="none" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1.5"/>
    <circle cx="80" cy="80" r="50" fill="none" stroke="#818cf8" stroke-opacity="0.4" stroke-width="1.5"/>
    <circle cx="80" cy="80" r="30" fill="url(#logoGrad)" opacity="0.9"/>
    <circle cx="80" cy="80" r="10" fill="white"/>
  </g>

  <!-- Petits points décoratifs -->
  <circle cx="1080" cy="120" r="3" fill="#6366f1"/>
  <circle cx="1130" cy="180" r="2" fill="#818cf8"/>
  <circle cx="1050" cy="220" r="2" fill="#a855f7"/>
</svg>
